  <line x1="190" y1="240" x2="610" y2="240" stroke="#1a237e" stroke-width="0.5" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(26, 35, 126);color:rgb(11, 11, 11);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="400" y="228" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="17" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:17px;font-weight:400;text-anchor:middle;dominant-baseline:auto">2. Alexander H &amp; Ida F — 38s</text>

  
  <rect x="190" y="240" width="420" height="40" fill="#85c1e9" opacity="0.6" style="fill:rgb(133, 193, 233);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="400" y="268" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="17" font-weight="bold" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:17px;font-weight:700;text-anchor:middle;dominant-baseline:auto">3. Frederik &amp; Marie — 47s</text>

  
  <line x1="190" y1="320" x2="610" y2="320" stroke="#1a237e" stroke-width="0.5" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(26, 35, 126);color:rgb(11, 11, 11);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="400" y="308" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="17" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:17px;font-weight:400;text-anchor:middle;dominant-baseline:auto">4. Alexander D &amp; Ida H — 53s</text>

  
  <text x="400" y="348" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="17" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:17px;font-weight:400;text-anchor:middle;dominant-baseline:auto">5. Malthe &amp; Marie — 61s</text>

  
  <rect x="670" y="400" width="110" height="60" rx="8" fill="#c8e6c9" stroke="#1a237e" stroke-width="2" style="fill:rgb(200, 230, 201);stroke:rgb(26, 35, 126);color:rgb(11, 11, 11);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="725" y="424" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="16" font-weight="500" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:500;text-anchor:middle;dominant-baseline:auto">PLAY</text>
  <text x="725" y="448" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="16" font-weight="500" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:500;text-anchor:middle;dominant-baseline:auto">AGAIN</text>

  
  <text x="400" y="500" text-anchor="middle" fill="#4a5568" font-family="sans-serif" font-size="12" style="fill:rgb(74, 85, 104);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Scoreboard screen — persistent top-5 per game, player's row highlighted</text>
