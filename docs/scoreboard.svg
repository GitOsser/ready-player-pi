<svg viewBox="0 0 810 530" xmlns="http://www.w3.org/2000/svg" role="img" style="width: 100%; border-radius: 12px; overflow: hidden;">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Scoreboard screen</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Post-game scoreboard showing the player's time, a top-5 leaderboard panel with team names, and a Play Again button.</desc>

  <rect x="0" y="0" width="800" height="520" fill="#f8f9ff" style="fill:rgb(248, 249, 255);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  
  <rect x="20" y="20" width="60" height="60" rx="8" fill="#d6eaf8" stroke="#1a237e" stroke-width="2" style="fill:rgb(214, 234, 248);stroke:rgb(26, 35, 126);color:rgb(11, 11, 11);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="50" y="58" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="28" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:28px;font-weight:400;text-anchor:middle;dominant-baseline:auto">↩</text>

  
  <text x="400" y="100" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="44" font-weight="500" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:44px;font-weight:500;text-anchor:middle;dominant-baseline:auto">SCOREBOARD  🏆</text>

  
  <text x="400" y="148" text-anchor="middle" fill="#1a237e" font-family="sans-serif" font-size="26" font-weight="500" style="fill:rgb(26, 35, 126);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:26px;font-weight:500;text-anchor:middle;dominant-baseline:auto">YOUR TIME: 47s</text>

  
  <rect x="190" y="160" width="420" height="200" rx="4" fill="#aed6f1" stroke="#1a237e" stroke-width="2" style="fill:rgb(174, 214, 241);stroke:rgb(26, 35, 126);color:rgb(11, 11, 11);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  
  <line x1="190" y1="200" x2="610" y2="200" stroke="#1a237e" stroke-width="0.5" opacity="0.4" style="fill:rgb(0, 0, 0);stroke:rgb(26, 35, 126);color:rgb(11, 11, 11);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
